inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/e9a7635a57597d9754eccebdfc7045e6c8600e6b
  treefmt-nix:
    url: github:numtide/treefmt-nix/db947814a175b7ca6ded66e21383d938df01c227
    inputs:
      nixpkgs:
        follows: nixpkgs
  # Emacs 31 lives on emacs-overlay (master). Pinned in lock-step with
  # flake.lock; bump both with `just update`.
  emacs-overlay:
    url: github:nix-community/emacs-overlay/a2250d8117c811a007be7989bab9db85545dbc5e
    inputs:
      nixpkgs:
        follows: nixpkgs

# https://devenv.sh/binary-caching/
# Pull pre-built artifacts from the personal jylhis cache (and the
# default devenv cache, which devenv adds automatically). Pushing is
# left to CI via devenv.local.nix or CACHIX_AUTH_TOKEN.
