# https://devenv.sh/integrations/github-actions/
#
# CI for the devenv shell. Builds the environment, runs `devenv test`
# (which exercises the seven enterTest assertions defined in
# devenv.nix), and pushes any newly built derivations to the personal
# `jylhis` cachix cache so subsequent runs and developer machines hit
# the binary cache instead of recompiling.
name: devenv

on:
  pull_request:
  push:
    branches:
      - next
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Mirror the local cachix.pull list and, when the secret is
      # available (i.e. on pushes from the main repo, not forks),
      # push freshly built artifacts back to the jylhis cache.
      - uses: cachix/cachix-action@v16
        with:
          name: jylhis
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv

      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: Build the devenv shell and run enterTest
        run: devenv test
