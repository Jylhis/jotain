name: CI

on:
  pull_request:
  push:
    branches: [main, next]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - uses: cachix/cachix-action@v16
        with:
          name: jylhis

      - uses: cachix/cachix-action@v16
        with:
          name: nix-community

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Run tests
        run: devenv test

      - name: Build outputs
        run: devenv build
