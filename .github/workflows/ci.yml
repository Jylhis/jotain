# CI for the Jotain Emacs configuration.
#
# Two jobs run in parallel across four platforms (x86_64-linux,
# aarch64-linux, x86_64-darwin, aarch64-darwin):
#
#   check — nix flake check (formatting, statix, deadnix, elisp-lint,
#           elisp-compile, and package builds — jotainEmacs,
#           jotainEmacsPackages, jotainInfo, options-doc are all flake
#           checks, so running a separate `nix build` job would
#           duplicate work)
#   test  — devenv test (dev environment assertions from devenv.nix)
#
# The jylhis cachix cache is used for pulling pre-built artifacts and
# pushing newly built ones (when CACHIX_AUTH_TOKEN is available).
name: CI

on:
  pull_request:
  push:
    branches:
      - next
      - main
      - master

# Cancel superseded runs on PR branches; keep protected-branch runs
# intact so post-merge cache pushes always finish.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && github.ref != 'refs/heads/next' }}

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.system }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          # macos-15-intel replaces retired macos-13; available until ~Aug 2027
          - os: macos-15-intel
            system: x86_64-darwin
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: nix flake check
        run: nix flake check --print-build-logs

  test:
    name: Dev environment (${{ matrix.system }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-15-intel
            system: x86_64-darwin
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv

      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: devenv test
        run: devenv test
