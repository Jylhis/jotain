# CI for the Jotain Emacs configuration — pull requests only.
#
# Runs the lightweight subset of nix/checks.nix on every PR. The heavy
# checks (elisp-compile, packages-default, packages-info) are deferred
# to deploy.yml on main so PR latency stays low even on cache miss.
#
# Two parallel jobs on x86_64-linux:
#
#   check — formatting, statix, deadnix, module-eval,
#           packages-doc-in-sync, packages-doc, options-doc, elisp-lint
#           (paren check; transitively builds the bare jotainEmacs from
#           cache).  Skips elisp-compile and the full grammar
#           distribution — those run in deploy.yml.
#   test  — devenv test (dev environment assertions from devenv.nix).
#
# The jylhis cachix cache is pulled from (PRs from forks have no auth
# token; that's fine, this workflow is read-only).  Cache pushes happen
# in deploy.yml on protected branches.
name: CI

on:
  pull_request:

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Lightweight flake checks
        run: |
          nix build --print-build-logs \
            .#checks.x86_64-linux.formatting \
            .#checks.x86_64-linux.statix \
            .#checks.x86_64-linux.deadnix \
            .#checks.x86_64-linux.module-eval \
            .#checks.x86_64-linux.packages-doc-in-sync \
            .#checks.x86_64-linux.packages-doc \
            .#checks.x86_64-linux.options-doc \
            .#checks.x86_64-linux.elisp-lint

  test:
    name: Dev environment
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv

      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: devenv test
        run: devenv test
