# Deploy generated module option docs to GitHub Pages.
#
# Builds the docs derivation (nix build .#docs) and publishes the
# result as a static site.  Requires GitHub Pages to be configured
# with Source = "GitHub Actions" in repository settings.
name: Deploy docs

on:
  push:
    branches: [main]
    # Only re-publish when something that affects the rendered site
    # actually changes.  Everything else (lisp/, test/, Justfile, …)
    # has no effect on docs and should not trigger a Pages build.
    paths:
      - "docs/**"
      - "nix/options-doc.nix"
      - "nix/info-manual.nix"
      - "emacs.nix"
      - "overlay.nix"
      - "module.nix"
      - "module-system.nix"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: jylhis
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build option docs
        run: nix build .#docs -o result-docs

      - name: Build Info manual
        run: nix build .#info -o result-info

      - name: Assemble Pages artifact
        run: |
          mkdir -p site
          cp -rL result-docs/. site/
          cp result-info/share/info/jotain.info site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
