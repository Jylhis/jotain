# Deploy generated module option docs to GitHub Pages.
#
# Builds the docs derivation (nix build .#docs) and publishes the
# result as a static site.  Requires GitHub Pages to be configured
# with Source = "GitHub Actions" in repository settings.
name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: jylhis
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build option docs
        run: nix build .#docs -o result-docs

      - name: Build Info manual
        run: nix build .#info -o result-info

      - name: Assemble Pages artifact
        run: |
          mkdir -p site
          cp -rL result-docs/. site/
          cp result-info/share/info/jotain.info site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
