# Worktrunk project config
# https://worktrunk.dev/config/

[post-create]
# Wire beads to the main repo's database via a redirect file.
# Git hooks are inherited automatically (worktrees share .git/hooks/),
# but the .beads/redirect file must be created explicitly.
beads = "mkdir -p .beads && printf '%s/.beads\\n' \"$(dirname $(git rev-parse --absolute-git-dir | sed 's|/worktrees/[^/]*$||'))\" > .beads/redirect"

[pre-merge]
# Run formatting checks + smoke tests before merging (<10s).
# Catches nixfmt/statix/deadnix violations and basic Emacs Lisp errors.
check = "just check-instant"
